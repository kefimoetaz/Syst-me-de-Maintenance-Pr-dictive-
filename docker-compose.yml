version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: maintenance_db
    environment:
      POSTGRES_DB: maintenance_predictive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maintenance_network

  # ML Service (Python/Flask)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ml_service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: maintenance_predictive
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-123}
      API_HOST: 0.0.0.0
      API_PORT: 5000
      API_TOKEN: ${ML_SERVICE_TOKEN:-dev-token-12345}
      MODEL_DIR: /app/models
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"
    volumes:
      - ml_models:/app/models
      - ml_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - maintenance_network
    restart: unless-stopped

  # Backend API (Node.js/Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: maintenance_predictive
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-123}
      ML_SERVICE_URL: http://ml-service:5000
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:-dev-token-12345}
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - ml-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/dashboard/overview"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - maintenance_network
    restart: unless-stopped

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    environment:
      VITE_API_URL: ${BACKEND_URL:-http://localhost:3000}
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - maintenance_network
    restart: unless-stopped

  # Agent (Python - Optional, for data collection)
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: data_agent
    environment:
      API_URL: http://backend:3000/api/data
      MACHINE_ID: ${MACHINE_ID:-1}
      COLLECTION_INTERVAL: ${COLLECTION_INTERVAL:-60}
    depends_on:
      - backend
    networks:
      - maintenance_network
    restart: unless-stopped
    profiles:
      - with-agent

volumes:
  postgres_data:
    driver: local
  ml_models:
    driver: local
  ml_logs:
    driver: local

networks:
  maintenance_network:
    driver: bridge
